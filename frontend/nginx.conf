# フロント静的配信 + /api を backend へ reverse proxy（同一オリジン化→CORS不要）。
# 本番(Cloud Run)・ローカル(docker-compose)で同構図。BACKEND_URL は環境変数で注入。
# 設計根拠: design_review_and_frontback.md §9

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API はすべて即返る設計（worker経路はNginxを通らない）ので read_timeout は既定で十分。
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # クライアントの Authorization: Bearer をそのまま backend へ渡す
        proxy_pass_request_headers on;
    }

    # SPA フォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }
}
