# CD: main へ push/merge で Cloud Run へ自動デプロイ（手動 workflow_dispatch も可）。
# 方式: GitHub ランナー上で docker build → Artifact Registry へ push → gcloud run deploy。
#   - 認証は Workload Identity Federation（長期鍵なし。infra/.../cicd.tf で構築）。
#   - Cloud Build は使わない: WIF と `gcloud builds submit` の quota project 相性問題
#     （ソースステージングの Storage API が serviceusage で弾かれる）を避けるため、
#     ランナーの docker でビルドして AR へ直接 push する。
#   - terraform state/tfvars は CI に持ち込まない。image は CD が所有し、terraform は
#     ignore_changes で drift を無視する（run.tf）。
#   - 変更があったサービスだけビルド＆デプロイ（backend は重いので無駄打ちを避ける）。
#     workflow_dispatch では両方を強制デプロイ。
#
# 事前に必要な GitHub Secrets（terraform apply 後の output から設定。docs/cicd-setup.md）:
#   WIF_PROVIDER             = terraform output workload_identity_provider
#   WIF_SERVICE_ACCOUNT      = terraform output deployer_sa_email
#   VITE_FIREBASE_API_KEY    } frontend バンドルへ焼き込む Firebase Web 設定（public 値）。
#   VITE_FIREBASE_AUTH_DOMAIN}  frontend/.env.local と同じ値。
#   VITE_FIREBASE_PROJECT_ID }
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # WIF の OIDC トークン取得に必須

env:
  PROJECT_ID: speak-score-app
  REGION: us-central1
  AR_REPO: speak-score # Artifact Registry リポジトリ名

jobs:
  # 変更のあったサービスを判定（backend は shared を import しないので分離）。
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & deploy backend
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/backend:${GITHUB_SHA::12}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          # context=backend/（shared 不要・pyproject/uv.lock/src がそこにある）
          docker build -f backend/Dockerfile -t "${IMAGE}" backend
          docker push "${IMAGE}"
          gcloud run deploy speak-score-backend \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}"

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & deploy frontend
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/frontend:${GITHUB_SHA::12}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          # context=リポジトリルート（Dockerfile が ../shared を参照）。Firebase 設定は build-arg。
          docker build -f frontend/Dockerfile \
            --build-arg "VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}" \
            --build-arg "VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}" \
            --build-arg "VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}" \
            -t "${IMAGE}" .
          docker push "${IMAGE}"
          gcloud run deploy speak-score-frontend \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}"
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
