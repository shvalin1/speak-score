name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync (with audio/llm extras for worker services)
        # 実サービス(transcription/audio_analysis/llm_evaluation)が numpy/librosa/openai を
        # import するため、worker 依存(audio/llm extras)込みで sync する（Dockerfile と一致）。
        run: uv sync --extra audio --extra llm
      - name: Lint
        run: uv run ruff check src/
      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
